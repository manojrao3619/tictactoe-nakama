services:
  nakama:
    build: .
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgresql://postgres:uMtuNeqrtiwEfbMoScKRskunPiuBPIkd@postgres.railway.internal:5432/railway &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgresql://postgres:uMtuNeqrtiwEfbMoScKRskunPiuBPIkd@postgres.railway.internal:5432/railway        
    expose:
      - "7349"
      - "7350"
      - "7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped

volumes:
  data:
